[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "realtalk"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic>=0.40",
    "chz>=0.3",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-cov",
    "hypothesis",
    "mypy",
    "ruff",
]

[project.scripts]
realtalk = "realtalk.cli:main"

[tool.ruff]
target-version = "py311"
select = ["E", "F", "I"]

[tool.mypy]
python_version = "3.11"
strict = true

[tool.pytest.ini_options]
addopts = "--doctest-modules"
testpaths = ["tests", "realtalk"]
